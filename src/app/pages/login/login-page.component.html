<div class="login" [class]="portalClass">
  <div class="login__panel">
    <header class="login__header">
      <div class="login__header-actions">
        <app-theme-picker />
        <app-language-picker />
      </div>
    </header>

    <div class="login__card">
      <span class="login__badge">{{ portal.login.badgeKey | translate }}</span>
      <h1 class="login__title">{{ portal.login.titleKey | translate }}</h1>
      @if (portal.login.subtitleKey) {
        <p class="login__subtitle">{{ portal.login.subtitleKey | translate }}</p>
      }

      @if (errorKey(); as key) {
        <p class="login__error" role="alert">{{ key | translate }}</p>
      }

      <app-form-page
        class="login__form"
        [definition]="formDef"
        [formGroup]="form"
        [submitDisabled]="submitting()"
        (submit)="onSubmit()"
      />

      <p class="login__switch">
        <a [routerLink]="alternateLoginUrl" class="login__switch-link">
          {{ switchPortalKey | translate }}
        </a>
      </p>
    </div>
  </div>
</div>
