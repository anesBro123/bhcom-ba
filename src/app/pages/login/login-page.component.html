<div class="login" [class]="portalClass">
  <div class="login__panel">
    <header class="login__header">
      <div class="login__header-actions">
        <app-theme-picker />
        <app-language-picker />
      </div>
    </header>

    <div class="login__card">
      <span class="login__badge">{{ portal.login.badgeKey | translate }}</span>
      <h1 class="login__title">{{ portal.login.titleKey | translate }}</h1>
      @if (portal.login.subtitleKey) {
        <p class="login__subtitle">{{ portal.login.subtitleKey | translate }}</p>
      }

      <form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="login__field">
          <label class="login__label" for="username">{{ 'login.username' | translate }}</label>
          <input
            id="username"
            type="text"
            class="login__input"
            formControlName="username"
            autocomplete="username"
          />
        </div>
        <div class="login__field">
          <label class="login__label" for="password">{{ 'login.password' | translate }}</label>
          <input
            id="password"
            type="password"
            class="login__input"
            formControlName="password"
            autocomplete="current-password"
          />
        </div>

        @if (errorKey(); as key) {
          <p class="login__error" role="alert">{{ key | translate }}</p>
        }

        <button type="submit" class="login__submit" [disabled]="submitting()">
          {{ 'login.submit' | translate }}
        </button>
      </form>

      <p class="login__switch">
        <a [routerLink]="alternateLoginUrl" class="login__switch-link">
          {{ switchPortalKey | translate }}
        </a>
      </p>
    </div>
  </div>
</div>
