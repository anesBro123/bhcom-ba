<app-table-filter-field
  [titleKey]="titleKey()"
  [collapsible]="collapsible()"
  [summary]="summary()"
  [showClear]="isActive()"
  (clear)="clearRange()"
>
  <app-date-period-picker
    [value]="value()"
    [mode]="singleDate() ? 'single' : 'range'"
    [allowPartial]="true"
    variant="filter"
    placeholderKey="shared.datePeriod.filterPlaceholder"
    (valueChange)="onValueChange($event)"
  />
</app-table-filter-field>
