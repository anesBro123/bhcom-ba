<app-table-filter-field
  [titleKey]="titleKey()"
  [collapsible]="collapsible()"
  [summary]="summary()"
  [showClear]="isFiltering()"
  (clear)="clearRange()"
>
  <div class="table-filter-number-range__body">
    <span
      class="table-filter-number-range__summary"
      [class.table-filter-number-range__summary--placeholder]="!isFiltering()"
    >{{ rangeSummary() }}</span>

    <div
      #track
      class="table-filter-number-range__track"
      [class.table-filter-number-range__track--inactive]="!isFiltering()"
      [style.--fill-left]="minThumbPercent()"
      [style.--fill-width]="maxThumbPercent() - minThumbPercent()"
      (pointerdown)="onTrackPointerDown($event)"
    >
      <div class="table-filter-number-range__track-bg" aria-hidden="true"></div>
      <div class="table-filter-number-range__track-fill" aria-hidden="true"></div>

      @if (showMinTooltip()) {
        <span
          class="table-filter-number-range__tooltip"
          aria-hidden="true"
          [style.--thumb-pos]="minThumbPercent()"
        >
          {{ tooltipValue(currentMin()) }}
        </span>
      }

      @if (showMaxTooltip()) {
        <span
          class="table-filter-number-range__tooltip"
          aria-hidden="true"
          [style.--thumb-pos]="maxThumbPercent()"
        >
          {{ tooltipValue(currentMax()) }}
        </span>
      }

      <button
        type="button"
        role="slider"
        class="table-filter-number-range__thumb table-filter-number-range__thumb--min"
        [attr.aria-label]="'shared.table.filters.from' | translate"
        [attr.aria-valuenow]="currentMin()"
        [attr.aria-valuemin]="min()"
        [attr.aria-valuemax]="currentMax()"
        [attr.aria-valuetext]="formatValue(currentMin())"
        [style.--thumb-pos]="minThumbPercent()"
        (pointerdown)="onThumbPointerDown($event, 'min')"
        (mouseenter)="onMinEnter()"
        (mouseleave)="onMinLeave()"
      ></button>

      <button
        type="button"
        role="slider"
        class="table-filter-number-range__thumb table-filter-number-range__thumb--max"
        [attr.aria-label]="'shared.table.filters.to' | translate"
        [attr.aria-valuenow]="currentMax()"
        [attr.aria-valuemin]="currentMin()"
        [attr.aria-valuemax]="max()"
        [attr.aria-valuetext]="formatValue(currentMax())"
        [style.--thumb-pos]="maxThumbPercent()"
        (pointerdown)="onThumbPointerDown($event, 'max')"
        (mouseenter)="onMaxEnter()"
        (mouseleave)="onMaxLeave()"
      ></button>
    </div>
  </div>
</app-table-filter-field>
