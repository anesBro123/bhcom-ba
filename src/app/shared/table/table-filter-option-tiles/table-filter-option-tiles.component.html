<app-table-filter-field
  [titleKey]="titleKey()"
  [collapsible]="collapsible()"
  [summary]="summary()"
  [showClear]="selected().length > 0"
  (clear)="clearSelection()"
>
  <div class="table-filter-option-tiles__grid" role="group" [attr.aria-label]="titleKey() | translate">
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="table-filter-option-tiles__tile"
        [class.table-filter-option-tiles__tile--selected]="isSelected(option.value)"
        [attr.aria-pressed]="isSelected(option.value)"
        (click)="onToggleOption(option.value)"
      >
        @if (showStatusBadge(option.value)) {
          <app-status-badge [status]="statusValue(option.value)" />
        } @else if (vehicleTypeValue(option.value); as vehicleType) {
          <app-vehicle-type-display [vehicleType]="vehicleType" />
        } @else {
          <span class="table-filter-option-tiles__tile-label">
            @if (isLabelKey(option)) {
              {{ option.labelKey | translate }}
            } @else {
              {{ option.label ?? option.value }}
            }
          </span>
        }
      </button>
    }
  </div>
</app-table-filter-field>
