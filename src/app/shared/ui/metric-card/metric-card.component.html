<article class="metric-card">
  <header class="metric-card__header">
    <h2 class="metric-card__title">{{ titleKey() | translate }}</h2>
    <span class="metric-card__icon" [attr.data-variant]="variant()">
      <ng-container *ngComponentOutlet="icon(); inputs: iconInputs" />
    </span>
  </header>
  <p class="metric-card__value">{{ value() }}</p>
  @if (subtitleKey()) {
    <p class="metric-card__subtitle">{{ subtitleKey()! | translate }}</p>
  }
</article>
