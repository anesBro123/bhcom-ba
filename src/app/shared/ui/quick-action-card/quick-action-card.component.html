<a
  class="quick-action-card"
  [ngClass]="entityHostClass()"
  [routerLink]="route()"
  [queryParams]="queryParams() ?? null"
>
  <span class="quick-action-card__icon">
    <ng-container *ngComponentOutlet="icon(); inputs: iconInputs" />
  </span>
  <h3 class="quick-action-card__title">{{ titleKey() | translate }}</h3>
  <p class="quick-action-card__description">{{ descriptionKey() | translate }}</p>
</a>
