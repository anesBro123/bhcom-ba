<span
  class="route-endpoints"
  [attr.aria-label]="'shared.route.fromTo' | translate: { origin: origin(), destination: destination() }"
>
  <span class="route-endpoints__origin">{{ origin() }}</span>
  <span class="route-endpoints__arrow" aria-hidden="true">→</span>
  <span class="route-endpoints__destination">{{ destination() }}</span>
</span>
