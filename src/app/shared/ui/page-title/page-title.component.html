<div class="page-title-block">
  <span class="page-title__icon" aria-hidden="true">
    <ng-container *ngComponentOutlet="icon(); inputs: iconInputs" />
  </span>
  <div class="page-title__text">
    <h1 class="page-title">{{ titleKey() | translate }}</h1>
    @if (subtitleKey()) {
      <p class="page-title__subtitle">{{ subtitleKey() | translate: subtitleParams() }}</p>
    }
  </div>
</div>
