<div class="lang-picker">
  <button
    type="button"
    class="lang-picker__trigger"
    [attr.aria-label]="(isEnglish() ? 'shared.topbar.lang.switchToBh' : 'shared.topbar.lang.switchToEn') | translate"
    [attr.title]="(isEnglish() ? 'shared.topbar.lang.switchToBh' : 'shared.topbar.lang.switchToEn') | translate"
    (click)="toggleLanguage()"
  >
    <span class="lang-picker__code" aria-hidden="true">{{ isEnglish() ? 'EN' : 'BS' }}</span>
  </button>
</div>
