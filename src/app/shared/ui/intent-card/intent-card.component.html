@if (clickableCard()) {
  <a
    [routerLink]="actions()[0].route"
    class="intent-card intent-card--clickable"
  >
    <div class="intent-card__header">
      <span class="intent-card__icon" aria-hidden="true">
        <ng-container *ngComponentOutlet="icon(); inputs: iconInputs" />
      </span>
      <h3 class="intent-card__title">{{ titleKey() | translate }}</h3>
    </div>
    <p class="intent-card__description">{{ descriptionKey() | translate }}</p>
    <span class="intent-card__action intent-card__action--continue">
      {{ actions()[0].labelKey | translate }}<span class="intent-card__arrow" aria-hidden="true"> →</span>
    </span>
  </a>
} @else {
  <article class="intent-card">
    <div class="intent-card__header">
      <span class="intent-card__icon" aria-hidden="true">
        <ng-container *ngComponentOutlet="icon(); inputs: iconInputs" />
      </span>
      <h3 class="intent-card__title">{{ titleKey() | translate }}</h3>
    </div>
    <p class="intent-card__description">{{ descriptionKey() | translate }}</p>
    <div class="intent-card__actions">
      @for (action of actions(); track action.route) {
        <a [routerLink]="action.route" class="intent-card__action">
          {{ action.labelKey | translate }}<span class="intent-card__arrow" aria-hidden="true"> →</span>
        </a>
      }
    </div>
  </article>
}
