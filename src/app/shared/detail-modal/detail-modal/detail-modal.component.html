@if (activeRequest(); as active) {
  <div class="detail-modal" role="presentation">
    <button
      type="button"
      class="detail-modal__backdrop"
      [attr.aria-label]="'shared.detailModal.common.close' | translate"
      (click)="onBackdropClick()"
    ></button>

    <div
      class="detail-modal__panel"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="'detail-modal-title'"
      [attr.aria-describedby]="active.options.subtitleKey ? 'detail-modal-subtitle' : null"
    >
      <header class="detail-modal__header">
        <div class="detail-modal__header-text">
          <h2 id="detail-modal-title" class="detail-modal__title">
            {{ active.options.titleKey | translate }}
          </h2>

          @if (active.options.subtitleKey) {
            <p id="detail-modal-subtitle" class="detail-modal__subtitle">
              {{ active.options.subtitleKey | translate: active.options.subtitleParams }}
            </p>
          }
        </div>

        <button
          type="button"
          class="detail-modal__close"
          [attr.aria-label]="'shared.detailModal.common.close' | translate"
          (click)="onClose()"
        >
          <svg lucideX [size]="18" />
        </button>
      </header>

      <div class="detail-modal__body">
        <app-detail-view
          [definition]="active.options.definition"
          [data]="active.options.data"
        />
      </div>

      <footer class="detail-modal__footer">
        @for (action of active.options.actions; track action.id) {
          <button
            type="button"
            class="detail-modal__btn"
            [class.detail-modal__btn--primary]="action.variant === 'primary'"
            [class.detail-modal__btn--secondary]="action.variant === 'secondary' || !action.variant"
            (click)="onAction(action.id)"
          >
            @if (action.icon) {
              <svg [lucideIcon]="action.icon" [size]="16" class="detail-modal__btn-icon" />
            }
            {{ action.labelKey | translate }}
          </button>
        }
      </footer>
    </div>
  </div>
}
