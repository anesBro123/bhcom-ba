<div class="app-shell">
  @if (sidebarService.mobileOpen()) {
    <button
      type="button"
      class="app-shell__backdrop"
      [attr.aria-label]="'sidebar.close' | translate"
      (click)="sidebarService.closeMobile()"
    ></button>
  }
  <app-sidebar />
  <div class="app-shell__main">
    <app-topbar />
    <main class="app-shell__content">
      <router-outlet />
    </main>
  </div>
</div>
