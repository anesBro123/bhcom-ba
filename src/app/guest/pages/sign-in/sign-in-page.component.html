<div class="sign-in">
  <header class="sign-in__header">
    <h1 class="sign-in__title">{{ 'guest.signIn.title' | translate }}</h1>
    <p class="sign-in__subtitle">{{ 'guest.signIn.subtitle' | translate }}</p>
  </header>

  <div class="sign-in__cards">
    <app-portal-card
      portalKind="user"
      badgeKey="guest.signIn.portals.user.badge"
      titleKey="guest.signIn.portals.user.title"
      descriptionKey="guest.signIn.portals.user.description"
      [route]="userLoginUrl"
    />
    <app-portal-card
      portalKind="admin"
      badgeKey="guest.signIn.portals.admin.badge"
      titleKey="guest.signIn.portals.admin.title"
      descriptionKey="guest.signIn.portals.admin.description"
      [route]="adminLoginUrl"
    />
  </div>

  <footer class="auth-card__footer sign-in__footer">
    <a [routerLink]="landingUrl" class="auth-card__back">
      {{ 'guest.backToHome' | translate }}
    </a>
  </footer>
</div>
