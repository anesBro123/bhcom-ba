<div class="portal-picker">
  <header class="portal-picker__header">
    <h1 class="portal-picker__title">{{ 'guest.signIn.title' | translate }}</h1>
    <p class="portal-picker__subtitle">{{ 'guest.signIn.subtitle' | translate }}</p>
  </header>

  <div class="portal-picker__cards">
    <app-portal-card
      portalKind="user"
      badgeKey="guest.signIn.portals.user.badge"
      titleKey="guest.signIn.portals.user.title"
      descriptionKey="guest.signIn.portals.user.description"
      [route]="userLoginUrl"
    />
    <app-portal-card
      portalKind="admin"
      badgeKey="guest.signIn.portals.admin.badge"
      titleKey="guest.signIn.portals.admin.title"
      descriptionKey="guest.signIn.portals.admin.description"
      [route]="adminLoginUrl"
    />
  </div>
</div>
