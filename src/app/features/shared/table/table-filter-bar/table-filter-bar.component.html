<div class="table-filter-bar">
  @for (filter of filters(); track filter.key) {
    @switch (filter.type) {
      @case ('search') {
        <label class="table-filter-bar__search">
          <span class="table-filter-bar__search-icon">
            <svg lucideSearch [size]="16" />
          </span>
          <input
            type="search"
            class="table-filter-bar__search-input"
            [placeholder]="filter.placeholderKey | translate"
            [value]="filterValue(filter.key)"
            (input)="onSearchInput(filter, $any($event.target).value)"
          />
        </label>
      }
      @case ('select') {
        <label class="table-filter-bar__select">
          <span class="table-filter-bar__select-label">{{ filter.titleKey | translate }}</span>
          <span class="table-filter-bar__select-wrap">
            <select
              class="table-filter-bar__select-input"
              [value]="filterValue(filter.key)"
              (change)="onSelectChange(filter.key, $any($event.target).value)"
            >
              <option value="">{{ filter.placeholderKey | translate }}</option>
              @for (option of filter.options; track option.value) {
                <option [value]="option.value">{{ option.labelKey | translate }}</option>
              }
            </select>
            <span class="table-filter-bar__select-icon">
              <svg lucideChevronDown [size]="16" />
            </span>
          </span>
        </label>
      }
    }
  }
</div>
