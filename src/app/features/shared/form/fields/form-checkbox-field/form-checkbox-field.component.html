<div class="form-field">
  <label class="form-checkbox-row">
    <input class="form-checkbox-row__input" type="checkbox" [formControl]="$any(control())" />
    @if (field().labelKey) {
      <span class="form-checkbox-row__label">{{ field().labelKey! | translate }}</span>
    }
  </label>

  @if (field().descriptionKey) {
    <p class="form-field__hint">{{ field().descriptionKey! | translate }}</p>
  }

  <app-form-field-error [control]="control()" [errorKeys]="field().errorKeys" />
</div>
