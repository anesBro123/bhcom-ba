<app-page-header>
  <app-page-title [titleKey]="pageTitleKey" [subtitleKey]="pageSubtitleKey" [icon]="pageIcon" />
  <app-primary-action-link [route]="createUrl" [labelKey]="createLabelKey" />
</app-page-header>

@if (tableMounted()) {
  <app-data-table [definition]="table" [loader]="loadVehicles" (rowAction)="onRowAction($event)">
    <ng-template [appTableCell]="vehicleTypeKey" let-row>
      <app-vehicle-type-display [vehicleType]="asVehicleType(row.vehicleType)" />
    </ng-template>
  </app-data-table>
}
