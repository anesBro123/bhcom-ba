<app-page-back-link [route]="backUrl" [labelKey]="backLabelKey" [form]="form" />

<app-page-title
  [titleKey]="pageTitleKey()"
  [subtitleKey]="pageSubtitleKey()"
  [icon]="pageIcon"
  entityTab="users"
/>

<app-form-page
  entityTab="users"
  [definition]="formDef()"
  [formGroup]="form"
  [submitDisabled]="submitting()"
  [stepperMode]="isEdit() ? 'edit' : 'create'"
  [stepperDataReady]="stepperDataReady()"
  (submit)="onSubmit()"
/>
