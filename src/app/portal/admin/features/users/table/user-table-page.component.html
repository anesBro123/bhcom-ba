@if (tableMounted()) {
  <app-data-table
    entityTab="users"
    [definition]="table"
    [loader]="loadUsers"
    [rowClickEnabled]="true"
    (rowClick)="onRowClick($event)"
    (rowAction)="onRowAction($event)"
  >
    <ng-template [appTableCell]="nameKey" let-row>
      <span class="user-table-name">{{ row.firstName }} {{ row.lastName }}</span>
    </ng-template>
  </app-data-table>
}
