<app-page-header>
  <app-page-title [titleKey]="pageTitleKey" [subtitleKey]="pageSubtitleKey" />
  <app-primary-action-link [route]="createUrl" [labelKey]="createLabelKey" />
</app-page-header>

@if (tableMounted()) {
  <app-data-table [definition]="table" [loader]="loadWarehouses" (rowAction)="onRowAction($event)">
    <ng-template [appTableCell]="typeKey" let-row>
      <span>{{ warehouseTypeLabel(row.type) | translate }}</span>
    </ng-template>
  </app-data-table>
}
