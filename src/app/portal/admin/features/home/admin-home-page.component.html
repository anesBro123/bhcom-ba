<div class="page-hub-header" [attr.data-entity-tab]="activeTab()">
  <app-page-header>
    <app-page-title
      titleKey="portal.admin.pages.home.title"
      subtitleKey="portal.admin.pages.home.subtitle"
      [icon]="pageIcon"
    />
    <app-primary-action-link
      [route]="createUrl()"
      [labelKey]="createLabelKey()"
    />
  </app-page-header>

  <app-entity-tabs
    ariaLabelKey="portal.admin.features.adminEntityTabs.ariaLabel"
    [activeTab]="activeTab()"
    [tabs]="entityTabs"
    (tabChange)="onTabChange($event)"
  />
</div>

@switch (activeTab()) {
  @case ('vehicles') {
    <app-vehicle-table-page />
  }
  @case ('warehouses') {
    <app-warehouse-table-page />
  }
  @default {
    <app-user-table-page />
  }
}
