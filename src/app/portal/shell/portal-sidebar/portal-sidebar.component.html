<aside class="sidebar" [class.sidebar--collapsed]="sidebarService.collapsed()">
  <div class="sidebar__brand">
    <app-brand-mark
      class="sidebar__brand-mark"
      [portalSuffixKey]="portal.shell.brandSuffixKey"
      [linkUrl]="portal.shell.homeUrl"
    />
    <button
      type="button"
      class="sidebar__brand-toggle"
      [attr.aria-label]="toggleLabelKey | translate"
      [attr.title]="toggleLabelKey | translate"
      [attr.aria-expanded]="!sidebarService.collapsed()"
      (click)="sidebarService.toggle()"
    >
      @if (sidebarService.collapsed()) {
        <svg lucidePanelLeftOpen [size]="18" />
      } @else {
        <svg lucidePanelLeftClose [size]="18" />
      }
    </button>
    <button
      type="button"
      class="sidebar__close"
      [attr.aria-label]="'sidebar.close' | translate"
      [attr.title]="'sidebar.close' | translate"
      (click)="sidebarService.closeMobile()"
    >
      <svg lucideX [size]="20" />
    </button>
  </div>

  <nav class="sidebar__nav">
    @for (section of navSections; track section.titleKey) {
      <div class="sidebar__section">
        <h2 class="sidebar__section-title">{{ section.titleKey | translate }}</h2>
        <ul class="sidebar__items">
          @for (item of section.items; track item.route) {
            <li>
              <a
                [routerLink]="item.route"
                routerLinkActive="sidebar__link--active"
                [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
                class="sidebar__link"
                [attr.title]="
                  sidebarService.collapsed() ? (item.labelKey | translate) : null
                "
              >
                <svg [lucideIcon]="item.icon" [size]="18" class="sidebar__link-icon" />
                <span>{{ item.labelKey | translate }}</span>
              </a>
            </li>
          }
        </ul>
      </div>
    }
  </nav>
</aside>
