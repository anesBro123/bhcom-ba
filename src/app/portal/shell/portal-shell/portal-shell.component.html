<div class="portal-shell">
  @if (sidebarService.mobileOpen()) {
    <button
      type="button"
      class="portal-shell__backdrop"
      [attr.aria-label]="'shared.sidebar.close' | translate"
      (click)="sidebarService.closeMobile()"
    ></button>
  }
  <portal-sidebar />
  <div class="portal-shell__main">
    <portal-topbar />
    <main class="portal-shell__content">
      <router-outlet />
    </main>
  </div>
</div>

<app-detail-modal />
