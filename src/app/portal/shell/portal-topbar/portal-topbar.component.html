<header class="topbar">
  <button
    type="button"
    class="topbar__menu-btn"
    [attr.aria-label]="'shared.topbar.openMenu' | translate"
    [attr.title]="'shared.topbar.openMenu' | translate"
    (click)="sidebarService.openMobile()"
  >
    <svg lucideMenu [size]="22" />
  </button>

  <div class="topbar__spacer"></div>

  <div class="topbar__actions">
    <app-theme-picker />

    <app-language-picker />

    <button
      type="button"
      class="topbar__icon-btn topbar__icon-btn--badge"
      [attr.aria-label]="'shared.topbar.notifications' | translate"
    >
      <svg lucideBell [size]="20" />
      <span class="topbar__badge">3</span>
    </button>

    <div class="topbar__account">
      <button
        type="button"
        class="topbar__icon-btn"
        [attr.aria-label]="'shared.topbar.openAccountMenu' | translate"
        [attr.aria-expanded]="accountMenuOpen()"
        aria-haspopup="menu"
        (click)="toggleAccountMenu()"
      >
        <svg lucideCircleUser [size]="20" />
      </button>

      @if (accountMenuOpen()) {
        <div class="topbar__account-menu" role="menu">
          <p class="topbar__account-header">{{ 'shared.topbar.account.title' | translate }}</p>
          <div class="topbar__account-divider" role="separator"></div>
          <button
            type="button"
            class="topbar__account-item"
            role="menuitem"
            (click)="onProfileClick()"
          >
            <svg lucideUser [size]="18" class="topbar__account-icon" />
            <span>{{ 'shared.topbar.account.profile' | translate }}</span>
          </button>
          <button
            type="button"
            class="topbar__account-item"
            role="menuitem"
            (click)="onSettingsClick()"
          >
            <svg lucideSettings [size]="18" class="topbar__account-icon" />
            <span>{{ 'shared.topbar.account.settings' | translate }}</span>
          </button>
          <div class="topbar__account-divider" role="separator"></div>
          <button
            type="button"
            class="topbar__account-item"
            role="menuitem"
            (click)="logout()"
          >
            <svg lucideLogOut [size]="18" class="topbar__account-icon" />
            <span>{{ 'shared.topbar.account.logout' | translate }}</span>
          </button>
        </div>
      }
    </div>
  </div>
</header>
