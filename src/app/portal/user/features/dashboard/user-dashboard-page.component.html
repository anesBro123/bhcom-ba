<app-page-title
  titleKey="portal.user.pages.dashboard.title"
  subtitleKey="portal.user.pages.dashboard.subtitle"
  [icon]="pageIcon"
/>

<div class="user-dashboard">
  <section
    class="user-dashboard__metrics"
    [attr.aria-label]="'portal.user.features.dashboard.metrics.ariaLabel' | translate"
  >
    @for (metric of metrics; track metric.route) {
      <a [routerLink]="metric.route" class="user-dashboard__metric-link">
        <app-metric-card
          [titleKey]="metric.titleKey"
          [value]="metricValue(metric.countKey)"
          [subtitleKey]="metric.subtitleKey"
          [icon]="metric.icon"
          [variant]="metric.variant"
        />
      </a>
    }
  </section>

  <section class="user-dashboard__quick-actions">
    <div class="user-dashboard__quick-actions-panel">
      <h2 class="user-dashboard__section-title">
        {{ 'portal.user.features.dashboard.quickActions.title' | translate }}
      </h2>
      <div class="user-dashboard__action-grid">
        @for (group of entityActionGroups; track group[0].route) {
          <div class="user-dashboard__action-column">
            @for (action of group; track action.route) {
              <app-quick-action-card
                [titleKey]="action.titleKey"
                [descriptionKey]="action.descriptionKey"
                [route]="action.route"
                [icon]="action.icon"
              />
            }
          </div>
        }
      </div>
    </div>
  </section>
</div>
