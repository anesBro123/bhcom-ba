<app-page-title [titleKey]="pageTitleKey" [subtitleKey]="pageSubtitleKey" [icon]="pageIcon" />

@if (tableMounted()) {
  <app-data-table
    [definition]="table"
    [loader]="loadCargo"
    (rowAction)="onRowAction($event)"
  >
    <ng-template [appTableCell]="routeKey" let-row>
      <app-route-display [origin]="row.origin" [destination]="row.destination" />
    </ng-template>
    <ng-template [appTableCell]="statusKey" let-row>
      <app-status-badge [status]="row.status" />
    </ng-template>
    <ng-template [appTableCell]="cargoTypeKey" let-row>
      {{ cargoTypeLabel(row.cargoType) | translate }}
    </ng-template>
    <ng-template [appTableCell]="sizeKey" let-row>
      <app-cargo-size-display [size]="row.size" [cargoType]="row.cargoType" />
    </ng-template>
    <ng-template [appTableCell]="neededByDateKey" let-row>
      <app-date-range-display [from]="row.neededByDate" />
    </ng-template>
  </app-data-table>
}
