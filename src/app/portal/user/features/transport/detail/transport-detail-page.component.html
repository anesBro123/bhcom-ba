<app-detail-page-layout>
  <app-page-back-link detailBack [route]="back().url" [labelKey]="back().labelKey" />

  <app-page-title
    [titleKey]="pageTitleKey"
    [subtitleKey]="pageSubtitleKey()"
    [icon]="pageIcon"
    entityTab="transport"
  />

  @if (loading()) {
    <section detailContent class="detail-page-card detail-page-card--loading">
      {{ 'shared.table.common.loading' | translate }}
    </section>
  } @else if (entity(); as row) {
    <app-entity-detail-summary
      detailSummary
      kind="route"
      [status]="row.status"
      [origin]="row.origin"
      [destination]="row.destination"
    />
  }

  @if (!loading() && entity(); as row) {
    <section detailContent class="detail-page-card">
      <app-detail-view [definition]="TransportDetail" [data]="row" />
    </section>
  }

  @if (!loading() && entity()) {
    <app-detail-action-bar
      detailFooterActions
      [actions]="detailActions()"
      layout="inline"
      (action)="onDetailAction($event)"
    />
  }
</app-detail-page-layout>
