<div class="page-hub-header" [attr.data-entity-tab]="activeTab()">
  <app-page-header>
    <app-page-title
      titleKey="portal.user.pages.home.title"
      subtitleKey="portal.user.pages.home.subtitle"
      [icon]="pageIcon"
    />
    <app-primary-action-link
      [route]="offerUrl()"
      [labelKey]="offerLabelKey()"
    />
  </app-page-header>

  <app-entity-tabs
    [activeTab]="activeTab()"
    [tabs]="entityTabs"
    (tabChange)="onTabChange($event)"
  />
</div>

@switch (activeTab()) {
  @case ('freight') {
    <app-freight-all-table-page [embedded]="true" />
  }
  @case ('warehouse') {
    <app-warehouse-all-table-page [embedded]="true" />
  }
  @default {
    <app-transport-all-table-page [embedded]="true" />
  }
}
